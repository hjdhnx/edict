# 历史 demo Compose：仅用于旧版模拟数据看板，不是当前主栈。
# 当前主启动入口请使用 edict/docker-compose.yml，端口为前端 7899、后端 7898。

version: '3.8'

services:
  sansheng-demo:
    image: cft0808/sansheng-demo:latest
    platform: linux/amd64
    ports:
      - "7891:7891"
    environment:
      - DEMO_MODE=true
    restart: unless-stopped

# 启动: docker compose up
# 如果在 ARM Mac (M1/M2/M3) 上运行，删除 platform 行即可
# 访问: http://localhost:7891
