# 历史占位文件：根目录 Compose 不再启动旧版 7891 demo。
#
# 当前主启动入口在 edict/docker-compose.yml。
# 请运行：
#   cd edict
#   cp .env.example .env
#   docker compose up -d --build
#
# 访问：
#   前端总控台 http://127.0.0.1:7899
#   后端健康检查 http://127.0.0.1:7898/health
#
# 为避免误启动旧 demo，本文件只提供一个会退出的提示服务。

services:
  deprecated-root-compose:
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        echo '根目录 docker-compose.yml 已废弃。'
        echo '请改用：cd edict && docker compose up -d --build'
        echo '前端：http://127.0.0.1:7899  后端：http://127.0.0.1:7898/health'
        exit 1
